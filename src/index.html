<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CS2 SkinScanner 🔎</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Anton&family=Inter:wght@400;500;600&family=Manrope:wght@600;700&family=Oswald:wght@600;700&display=swap"
        rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
        body {
            width: 650px;
            min-height: 450px;
            max-height: 600px;
            overflow-y: auto;
            position: relative;
            padding: 0.75rem;
            padding-bottom: 0.75rem;
        }

        .container {
            border-radius: 8px;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        h2,
        h3 {
            margin: 0;
            padding: 0;
        }

        .form-group {
            margin: 0;
            padding: 0;
        }

        #skinForm {
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: 1fr auto;
            flex-grow: 1;
            overflow: hidden;
            border-top: 1px solid #dde1e6;
        }

        body.dark-mode #skinForm {
            border-top-color: #313847;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="app-header">
            <div class="app-brand">
                <img src="header-icon.svg" alt="SkinScanner" class="app-logo">
                <div class="app-title"><span class="app-title-skin">SKIN</span><span
                        class="app-title-accent">SCANNER</span></div>
            </div>
            <div class="app-header-actions">
                <span class="made-by">Made by 🧢 Dadscap</span>
                <div class="social-icons">
                    <a href="https://www.youtube.com/@Dadscap" target="_blank" rel="noopener noreferrer"
                        class="social-icon youtube" aria-label="Dadscap on YouTube"><span
                            aria-hidden="true">▶</span></a>
                    <a href="https://x.com/dadscap" target="_blank" rel="noopener noreferrer"
                        class="social-icon x-twitter" aria-label="Dadscap on X"><span aria-hidden="true">𝕏</span></a>
                </div>
            </div>
        </div>
        <form id="skinForm">
            <div class="form-column-left">
                <div class="form-group">
                    <div class="label-container">
                        <label for="item_name" class="label-bold">Item Name</label>
                        <span class="info-icon"
                            title="For best results, select a match from the autocomplete dropdown.">𝒾</span>
                        <button type="button" id="resetFiltersButton" class="reset-filters-button"
                            title="Reset all filters to default values">Reset Filters</button>
                    </div>
                    <input type="text" id="item_name" name="item_name" placeholder="AK-47 | Redline" autocomplete="off"
                        required>
                </div>
                <div class="form-group">
                    <div class="checkbox-button-container">
                        <label class="checkbox-button-label" for="stattrak" id="stattrakLabel"><input type="checkbox"
                                id="stattrak" name="stattrak"><span>StatTrak™</span></label>
                        <label class="checkbox-button-label" for="notradehold" id="noTradeHoldLabel"><input
                                type="checkbox" id="notradehold" name="notradehold"><span>Tradable</span></label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="exterior" class="label-bold">Wear/Float Range</label>
                    <select id="exterior" name="exterior">
                        <option value="">Any</option>
                        <option value="fn">Factory New (0.00-0.07)</option>
                        <option value="mw">Minimal Wear (0.07-0.15)</option>
                        <option value="ft">Field-Tested (0.15-0.38)</option>
                        <option value="ww">Well-Worn (0.38-0.45)</option>
                        <option value="bs">Battle-Scarred (0.45-1.00)</option>
                    </select>
                </div>
                <div class="form-group">
                    <div class="float-range">
                        <div class="dual-range-container">
                            <input type="range" id="minFloatRange" name="minFloatRange" min="0" max="1" step="0.001"
                                value="0.000" class="dual-range-min">
                            <input type="range" id="maxFloatRange" name="maxFloatRange" min="0" max="1" step="0.001"
                                value="1.000" class="dual-range-max">
                        </div>
                        <div class="float-inputs-row">
                            <div class="float-input-group"><input type="number" id="minFloatInput" name="minFloatInput"
                                    min="0" max="1" step="0.001" value="0.000" class="float-input"></div>
                            <span class="float-range-dash">–</span>
                            <div class="float-input-group"><input type="number" id="maxFloatInput" name="maxFloatInput"
                                    min="0" max="1" step="0.001" value="1.000" class="float-input"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="paint_seed" class="label-bold">Paint Seed/Pattern</label>
                        <input type="number" id="paint_seed" name="paint_seed" placeholder="e.g., 442" min="0"
                            max="1000" step="1" class="pattern-input">
                        <div class="secret-teaser">
                            <div class="teaser-line-1">🔍 Inspecting new features...</div>
                            <div class="teaser-line-2"><span class="redacted">[REDACTED]</span></div>
                            <div class="teaser-line-3">(coming soon)</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-column-right">
                <div class="form-group">
                    <div class="marketplaces-header">
                        <div class="marketplaces-title">Marketplaces:</div>
                        <div class="select-all-container select-all-all"><input type="checkbox" id="selectAll"
                                name="selectAll"><label for="selectAll">All</label></div>
                        <div class="select-all-container select-all-buysell"><input type="checkbox" id="selectBuySell"
                                name="selectBuySell"><label for="selectBuySell">Buy/Sell</label></div>
                        <div class="select-all-container select-all-trade"><input type="checkbox" id="selectTrade"
                                name="selectTrade"><label for="selectTrade">Trade</label></div>
                        <div class="select-all-container select-all-china"><input type="checkbox" id="selectChina"
                                name="selectChina"><label for="selectChina"><img
                                    src="https://img.icons8.com/?size=15&id=OafC2pWK4RV4&format=png&color=000000"
                                    alt="China"></label></div>
                    </div>
                </div>
